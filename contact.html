<body>
	<div class="container-fluid">
		<div class="row announcement text-center">
			<div class="col text">
				<span>Welcome to AdventureGear Co. New users have 20% off discount.</span>

			<div class="container-fluid">

						<div class="container-fluid text-primary justify-content-center align-items-top;">

							<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">

							<div class="fixed-position">
								<div>
									<button class="btn btn-outline-success"> Login </button>

									<button class="btn btn-outline-success"> Cart </button>

								<ul class="navbar-nav me-auto mb-sm-2 mb-lg-1">

								<form class="d-flex" role="search">

				</div>
			</div>
		</div>
		<hr class="first_hr">
		
		<div class="row justify-content-center text-center mt-4 mb-3"><h1>Contact</h1></div>
		<div class="row justify-content-center align-items-center">
			<div class="col-11 col-sm-10 col-md-9 col-lg-8">
				<form id="contact-form">
					<div class="row mb-3">
						<select class="form-select" aria-label="Select the query type" placeholder="Please select your query type" required>
							<option value="" disabled selected hidden>Select your query type</option>
							<option value="1">Booking</option>
							<option value="2">Payment</option>
							<option value="3">General Information</option>
							<option value="3">Other</option>
						</select>
					</div>

					<div class="row mb-3">
						<label for="first-name" class="form-label">Name <span class="required-field">*</span></label>
						<div class="col ps-0">
							<input type="text" id="first-name" class="form-control" placeholder="First name" aria-label="First name" required>
						</div>
						<div class="col pe-0">
							<input type="text" class="form-control" placeholder="Last name" aria-label="Last name">
						</div>
					</div>

					<div class="row mb-3">
						<label for="email" class="form-label">Email <span class="required-field">*</span></label>
						
						<input type="email" class="form-control" id="email" maxlength="64" required>
						
					</div>
					<div class="row mb-3">
						<label for="phone" class="form-label">Phone</label>
						
						<input type="tel" class="form-control" id="phone" pattern="[0-9]{3,20}" maxlength="20" placeholder="3 to 20 numeric characters">
						
					</div>
					<div class="row mb-3 textarea-wrapper">
						  <label for="query-message" class="form-label">Message<span class="required-field">*</span></label>
  						  <textarea class="form-control" id="query-message" rows="6" minlength="20" maxlength="600" placeholder="At leaset 20 characters." required></textarea>
						  <span class="length_instrument"> 0 / 600 </span>
					</div>
	
					<div class="row mb-3 justify-content-center">
					<button id="submit_message" type="submit" class="btn btn-primary">Submit</button>
					</div>
				</form>
			</div>
		</div>
		<hr>
		<div class="row my-3">
		<footer class="text-center">
			<p>Designed by Xuquan Deng for assignment of education.</p>
			<a href="credits.html">Photo Credits</a>
		</footer>
		</div>
	</div>
	<div class="toast-container position-fixed top-50 start-50 translate-middle-x p-3">
		<div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
			<div class="toast-header">
			<!-- <img src="..." class="rounded me-2" alt="..."> -->
			<strong class="me-auto">Message Sended</strong>
			<button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
			</div>
			<div class="toast-body">
			Thank you for your query message. We will reach out to you soon.
			</div>
		</div>
	</div>
